<div class="d-flex flex-row align-items-center justify-content-between field-height">
  <b>{{'MEMBER_DETAIL.OVERVIEW.STATUS' | translate}}</b>
  <div class="d-flex flex-row align-items-center justify-content-center">
    <i class="material-icons me-1 {{(status | groupStatusIconColor)}}">
      {{status | memberStatusIcon}}
    </i>
    <span class="me-2">{{status | transformMemberStatus}}</span>
    @if (editStatusAuth) {
      <span
        [matTooltip]="isIndirect
          ? ('SHARED_LIB.PERUN.COMPONENTS.MEMBERS_LIST.STATUS_TOOLTIP_GROUP_INDIRECT' | translate)
          : ('MEMBER_DETAIL.OVERVIEW.CHANGE_STATUS' | translate)">
        <button (click)="onChangeStatus()" mat-icon-button [disabled]="isIndirect">
          <mat-icon>edit</mat-icon>
        </button>
      </span>
    }
  </div>
</div>
@if (showExpiration) {
  <mat-divider></mat-divider>
}
@if (showExpiration) {
  <div
    class="d-flex flex-row align-items-center align-items-center justify-content-between field-height">
    <b>{{'MEMBER_DETAIL.OVERVIEW.EXPIRATION' | translate}}</b>
    <div class="d-flex flex-row align-items-center justify-content-center">
      <i class="me-2"> {{expiration | parseDate}} </i>
      @if (editExpirationAuth) {
        <span
          [matTooltip]="isIndirect
            ? ('SHARED_LIB.PERUN.COMPONENTS.MEMBERS_LIST.EXPIRATION_TOOLTIP_GROUP_INDIRECT' | translate)
            : ('MEMBER_DETAIL.OVERVIEW.CHANGE_EXPIRATION' | translate)">
          <button (click)="onChangeExpiration()" mat-icon-button [disabled]="isIndirect">
            <mat-icon>edit</mat-icon>
          </button>
        </span>
      }
    </div>
  </div>
}
